<script>
// Intercept SockJS to see what URL client.js uses
var _SockJS = SockJS;
window.SockJS = function(url, opts) {
  print('SockJS connecting to: ' + url);
  var s = new _SockJS(url, opts);
  s.addEventListener('open', function() { print('OPEN'); });
  s.addEventListener('message', function(e) { print('MSG: ' + String(e.data).substring(0,100)); });
  s.addEventListener('close', function(e) { print('CLOSED: ' + e.code + ' ' + e.reason); });
  return s;
};
window.SockJS.prototype = _SockJS.prototype;
print('SockJS interceptor ready');
</script>
